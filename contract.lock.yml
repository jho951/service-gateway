contract:
  repo: https://github.com/jho951/service-contract
  ref: main
  commit: 2d6aaed6ca860308a3b732ebad539d6591127480

service:
  name: gateway-service
  branch: main
  role: gateway
  consumes:
    - shared/routing.md
    - shared/headers.md
    - shared/security.md
    - shared/errors.md
    - shared/auth-channel-policy.md
    - shared/ci-cd.md
    - repositories/gateway-service/**
    - repositories/auth-service/**
    - repositories/authz-service/**
    - repositories/user-service/**
    - repositories/editor-service/**
    - artifacts/openapi/auth-service.upstream.v1.yaml

validation:
  contract_lock: true
  openapi: true
  schema: true
  routing: true
  headers: true
  errors: true
  security: true

ci:
  profile: spring-boot
  runtime: java
  java_version: "17"
  setup: gradle
  test_command: ./gradlew --no-daemon clean test
  build_command: ./gradlew --no-daemon installDist -x test
  docker: true
  contract_check: true

cd:
  profile: ec2-compose
  target: ec2
  strategy: docker-compose
  environments:
    - dev
    - prod
  image_registry: ghcr.io
  deploy_on: protected_branch
  health_check: true
  smoke_test: true

notes:
  owner: gateway-service
  automation_level: guardrail
  legacy_sync_doc: false
