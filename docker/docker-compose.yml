services:
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      GATEWAY_BIND: 0.0.0.0
      GATEWAY_PORT: 8080
      GATEWAY_CORS_ALLOWED_ORIGINS: "*"
      GATEWAY_IP_GUARD_ENABLED: "false"
      GATEWAY_ALLOWED_IPS: "127.0.0.1"
      GATEWAY_ADMIN_IP_GUARD_ENABLED: "false"
      GATEWAY_ADMIN_ALLOWED_IPS: "127.0.0.1"
      GATEWAY_ADVANCED_ROUTE_POLICIES_ENABLED: "false"
      GATEWAY_ADMIN_PERMISSION_CHECK_ENABLED: "false"
      GATEWAY_PERMISSION_CACHE_ENABLED: "false"
      AUTH_SERVICE_URL: http://host.docker.internal:8081
      USER_SERVICE_URL: http://host.docker.internal:8082
      BLOCK_SERVICE_URL: http://host.docker.internal:8083
      REDIS_HOST: redis
      REDIS_PORT: 6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
