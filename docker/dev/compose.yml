services:
  gateway-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      secrets:
        - gh_token
        - github_actor
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ${GATEWAY_ENV_FILE:-../../.env.dev}
    environment:
      APP_ENV: dev
      APP_ENV_FILE: /app/.env.dev
      APP_MODULE: app
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8081}
      AUTH_SERVICE_INTERNAL_REQUEST_SECRET: ${AUTH_SERVICE_INTERNAL_REQUEST_SECRET:-local-internal-api-key}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:8082}
      EDITOR_SERVICE_URL: ${EDITOR_SERVICE_URL:-http://editor-service:8083}
      AUTHZ_ADMIN_VERIFY_URL: ${AUTHZ_ADMIN_VERIFY_URL:-http://authz-service:8084/permissions/internal/admin/verify}
      GATEWAY_INTERNAL_REQUEST_SECRET: ${GATEWAY_INTERNAL_REQUEST_SECRET:-local-authz-internal-secret}
      AUTHZ_INTERNAL_JWT_SECRET: ${AUTHZ_INTERNAL_JWT_SECRET:-local-authz-internal-jwt-secret}
      AUTHZ_INTERNAL_JWT_ISSUER: ${AUTHZ_INTERNAL_JWT_ISSUER:-api-gateway}
      AUTHZ_INTERNAL_JWT_AUDIENCE: ${AUTHZ_INTERNAL_JWT_AUDIENCE:-authz-service}
      REDIS_HOST: ${REDIS_HOST:-central-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_TIMEOUT_MS: ${REDIS_TIMEOUT_MS:-1000}
      GATEWAY_AUTHZ_CACHE_ENABLED: ${GATEWAY_AUTHZ_CACHE_ENABLED:-false}
      GATEWAY_AUTHZ_CACHE_TTL_SECONDS: ${GATEWAY_AUTHZ_CACHE_TTL_SECONDS:-300}
      GATEWAY_AUTHZ_CACHE_PREFIX: ${GATEWAY_AUTHZ_CACHE_PREFIX:-gateway:admin-authz:}
      GATEWAY_SESSION_CACHE_ENABLED: ${GATEWAY_SESSION_CACHE_ENABLED:-true}
      GATEWAY_SESSION_LOCAL_CACHE_TTL_SECONDS: ${GATEWAY_SESSION_LOCAL_CACHE_TTL_SECONDS:-3}
      GATEWAY_SESSION_CACHE_TTL_SECONDS: ${GATEWAY_SESSION_CACHE_TTL_SECONDS:-60}
      GATEWAY_SESSION_CACHE_KEY_PREFIX: ${GATEWAY_SESSION_CACHE_KEY_PREFIX:-gateway:session:}
secrets:
  gh_token:
    environment: GH_TOKEN
  github_actor:
    environment: GITHUB_ACTOR
